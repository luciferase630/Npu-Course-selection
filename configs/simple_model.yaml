# 单轮简化模型配置草案
model_name: simple_single_round_all_pay
random_seed: 20260425

repeated_experiments:
  n_repetitions: 50
  seed_policy: base_seed_plus_repetition_index
  utility_resample_per_repetition: true
  capacity_jitter_per_repetition: true
  capacity_jitter:
    type: bounded_integer_delta
    min_delta: -5
    max_delta: 5
    min_capacity: 1

objective:
  type: expected_utility_maximization
  profile_source: data/synthetic/profiles.csv
  profile_requirements_source: data/synthetic/profile_requirements.csv
  student_source: data/synthetic/students.csv
  utility_source: data/synthetic/student_course_utility_edges.csv
  primary_utility_field: utility
  requirements_source: data/synthetic/student_course_code_requirements.csv
  course_metadata_source: data/synthetic/courses.csv
  include_missing_required_penalty: true
  missing_required_penalty_source: derived_from_requirement_penalty_model
  include_bean_cost: true
  default_bean_cost_lambda: 1
  bean_cost_lambda_interpretation: opportunity_cost_shadow_price
  bean_cost_lambda_default_scope: valid_only_after_utility_scale_normalization
  bean_cost_lambda_calibration_method: normalize_utility_to_bean_unit_for_mvp
  state_dependent_lambda:
    enabled: true
    formula: base_lambda * risk_multiplier * grade_multiplier * requirement_pressure_multiplier * budget_multiplier
    risk_multipliers:
      conservative: 1.15
      balanced: 1.0
      aggressive: 0.9
    grade_multipliers:
      freshman: 0.9
      sophomore: 0.95
      junior: 1.1
      senior: 1.35
      graduation_term: 1.8
    requirement_pressure_budget_divisor: 4.0
    requirement_pressure_cap: 1.0
    low_budget_threshold_ratio: 0.35
    state_fields:
      - grade_stage
      - risk_type
      - derived_missing_required_penalty
      - remaining_budget

requirement_penalty_model:
  source: derived_not_hand_entered_per_row
  scale_assumption: same_unit_as_utility
  calibration_method: utility_distribution_and_budget_shadow_price
  base_by_requirement_type:
    required: utility_p95_plus_full_budget_opportunity_cost
    strong_elective_requirement: utility_p75
    optional_target: utility_p50_half
  weight_by_requirement_priority:
    degree_blocking: high_urgency_multiplier
    progress_blocking: medium_high_urgency_multiplier
    normal: neutral_multiplier
    low: low_urgency_multiplier
  priority_weights:
    degree_blocking: 1.5
    progress_blocking: 1.2
    normal: 1.0
    low: 0.5
  deadline_multipliers:
    past_far: 0.45
    past_recent: 0.75
    current: 1.25
    next: 1.0
    future: 0.55
    legacy_current: 1.0
  require_sensitivity_analysis: true

information:
  show_capacity: true
  show_observed_waitlist_count: true
  hide_other_students_bids: true
  observed_waitlist_field: observed_waitlist_count

intra_round_dynamics:
  enabled: true
  time_points_per_round: 3
  final_time_point_is_deadline: true
  allow_bid_revision: true
  allocation_uses_final_bids_only: true
  allowed_action_types:
    - keep
    - increase
    - decrease
    - withdraw
    - new_bid

budget:
  initial_beans: 100
  bean_type: integer
  integer_bids_only: true
  reject_fractional_bids: true
  refund_losing_bids: false

auction:
  rounds: 1
  allocation_rule: highest_bids_win
  tie_breaking: seeded_random_among_boundary_ties
  allow_zero_bid_application: true
  bid_domain: nonnegative_integers

agent_design:
  default_agent_type: llm_natural
  no_strategy_prompt_means: rules_prompt_only
  system_prompt: prompts/single_round_all_pay_system_prompt.md
  formula_prompt_mode: formula_as_uncertain_signal
  strategy_prompt_mode: explicit_extra_instruction
  llm_agent_types:
    - llm_natural
    - llm_formula_informed
    - llm_strategy_prompted
  non_llm_agent_types:
    - scripted_policy

llm_context:
  interaction_mode: single_shot
  max_displayed_course_sections: 40
  max_retries_on_invalid_output: 2
  max_tool_rounds: 10
  tool_history_policy: compact_last_n
  tool_history_last_rounds: 1
  tool_starter_top_courses_max_results: 8
  tool_starter_required_sections_max_per_requirement: 3
  tool_require_search_before_submit: false
  tool_search_requirement_min_rounds_remaining: 2
  display_policy: attention_window_required_sections_then_high_utility
  filtered_courses_remain_eligible: true
  tool_system_prompt: prompts/tool_based_system_prompt.md

formula_parameters:
  formula_multiplier_name: rho
  formula_multiplier_rho_range:
    min: 0.75
    max: 1.3
  alpha_offset_definition: alpha = rho - 1
  alpha_offset_range:
    min: -0.25
    max: 0.3
  prefer_formula_multiplier_rho_in_outputs: true

experiment_groups:
  - name: E0_llm_natural_baseline
    llm_natural_share: 1.0
    formula_share: 0.0
    scripted_policy_share: 0.0
    strategy_prompted_count: 0
    visible_formula_share: none
  - name: E1_one_scripted_policy_agent
    llm_natural_share: remainder
    formula_share: 0.0
    scripted_policy_count: 1
    strategy_prompted_count: 0
    visible_formula_share: none
  - name: E2_10pct_scripted_policy_agents
    llm_natural_share: 0.9
    formula_share: 0.0
    scripted_policy_share: 0.1
    strategy_prompted_count: 0
    visible_formula_share: none
  - name: E3_one_strategy_prompt_llm_agent
    llm_natural_share: remainder
    formula_share: 0.0
    scripted_policy_share: 0.0
    strategy_prompted_count: 1
    visible_formula_share: none
  - name: E4_formula_30pct_unknown_coverage
    llm_natural_share: 0.7
    formula_share: 0.3
    scripted_policy_share: 0.0
    strategy_prompted_count: 0
    true_formula_share: 0.3
    visible_formula_share: unknown
  - name: E5_formula_20pct_unknown_coverage
    llm_natural_share: 0.8
    formula_share: 0.2
    scripted_policy_share: 0.0
    strategy_prompted_count: 0
    true_formula_share: 0.2
    visible_formula_share: unknown

scripted_policies:
  enabled_for_controls_only: true
  policies:
    - equal_split
    - utility_weighted
    - required_penalty_first
    - teacher_preference
    - conservative_capacity
    - aggressive_top_utility
    - near_capacity_zero_bid
    - last_minute_snipe

behavior_tags:
  derive_after_decision: true
  tags:
    - early_probe
    - crowding_retreat
    - near_capacity_zero_bid
    - last_minute_snipe
    - defensive_raise
    - utility_weighted_like
    - overbid_low_utility

constraints:
  enforce_course_code_unique: true
  enforce_time_conflict: true
  enforce_total_credit_cap: true
  enforce_category_credit_cap: false
  schedule_feasibility:
    enabled_in_first_stage: false
    time_conflict_is_hard_constraint_when_enabled: true
    record_violations_when_disabled: true
    violation_metrics:
      - time_conflict_violation_count
      - infeasible_schedule_count

outputs:
  run_root: outputs/runs
  save_bid_events: true
  save_decisions: true
  save_allocations: true
  save_budgets: true
  save_utilities: true
  save_metrics: true
