# 三轮现实模型配置草案
model_name: realistic_three_rounds_refund_losing_bids
random_seed: 20260425

objective:
  type: dynamic_expected_utility_maximization
  utility_source: data/synthetic/student_course_utility_edges.csv
  primary_utility_field: utility
  requirements_source: data/synthetic/student_course_code_requirements.csv
  course_metadata_source: data/synthetic/courses.csv
  include_missing_required_penalty: true
  missing_required_penalty_source: derived_from_requirement_penalty_model
  include_bean_cost: true
  default_bean_cost_lambda: 1
  bean_cost_lambda_interpretation: opportunity_cost_shadow_price
  bean_cost_lambda_default_scope: valid_only_after_utility_scale_normalization
  bean_cost_lambda_calibration_method: estimate_from_remaining_round_opportunity_cost
  state_dependent_lambda:
    enabled: true
    formula: base_lambda * risk_multiplier * grade_multiplier * requirement_pressure_multiplier * budget_multiplier
    risk_multipliers:
      conservative: 1.15
      balanced: 1.0
      aggressive: 0.9
    grade_multipliers:
      freshman: 0.9
      sophomore: 0.95
      junior: 1.1
      senior: 1.35
      graduation_term: 1.8
    requirement_pressure_budget_divisor: 4.0
    requirement_pressure_cap: 1.0
    low_budget_threshold_ratio: 0.35
    state_fields:
      - grade_stage
      - risk_type
      - derived_missing_required_penalty
      - remaining_budget
      - remaining_rounds

requirement_penalty_model:
  source: derived_not_hand_entered_per_row
  scale_assumption: same_unit_as_utility
  calibration_method: utility_distribution_budget_shadow_price_and_remaining_rounds
  base_by_requirement_type:
    required: utility_p95_plus_full_budget_opportunity_cost
    strong_elective_requirement: utility_p75
    optional_target: utility_p50_half
  weight_by_requirement_priority:
    degree_blocking: high_urgency_multiplier
    progress_blocking: medium_high_urgency_multiplier
    normal: neutral_multiplier
    low: low_urgency_multiplier
  priority_weights:
    degree_blocking: 1.5
    progress_blocking: 1.2
    normal: 1.0
    low: 0.5
  deadline_multipliers:
    past_far: 0.45
    past_recent: 0.75
    current: 1.25
    next: 1.0
    future: 0.55
    legacy_current: 1.0
  require_sensitivity_analysis: true
  future_extension: adjust_by_remaining_rounds_and_substitute_count
  course_section_id: course_id
  course_identity_id: course_code

information:
  show_capacity: true
  show_remaining_capacity: true
  show_observed_waitlist_count: true
  hide_other_students_bids: true
  observed_waitlist_field: observed_waitlist_count

intra_round_dynamics:
  enabled: true
  time_points_per_round: 5
  final_time_point_is_deadline: true
  allow_bid_revision: true
  allocation_uses_final_bids_only: true
  allowed_action_types:
    - keep
    - increase
    - decrease
    - withdraw
    - new_bid

budget:
  initial_beans: 100
  bean_type: integer
  integer_bids_only: true
  reject_fractional_bids: true
  refund_losing_bids_each_round: true
  charge_winning_bids_each_round: true

auction:
  rounds: 3
  allocation_rule: highest_bids_win
  tie_breaking: seeded_random_among_boundary_ties
  allow_zero_bid_application: true
  bid_domain: nonnegative_integers

course_release:
  parameterized: true
  default_round_1:
    required_courses: 1.0
    elective_courses: 0.6
  default_round_2:
    include_unfilled_previous_courses: true
    include_remaining_elective_courses: true
  default_round_3:
    include_courses_with_remaining_capacity: true

constraints:
  enforce_course_code_unique: true
  enforce_time_conflict: true
  enforce_total_credit_cap: true
  total_credit_cap_default: 30
  enforce_category_credit_cap: true
  category_credit_caps:
    freshman_first_semester:
      English: 2
    later_semesters:
      English: 3

llm_agents:
  enabled: false
  trace_prompts: true
  validate_outputs: true
  repair_invalid_outputs: true

formula_information:
  enabled: false
  informed_student_ratio: 0.3
  status: analyze_as_information_signal_not_optimal_bid
  formula_multiplier_name: rho
  formula_multiplier_rho_range:
    min: 0.75
    max: 1.3
  alpha_offset_definition: alpha = rho - 1
  alpha_offset_range:
    min: -0.25
    max: 0.3
  raw_signal_can_be_float: true
  final_bid_must_be_integer: true
  rounding_rule: nearest_integer_then_clip_to_available_budget
  experiment_groups:
    - E0_llm_natural_baseline
    - E4_formula_30pct_unknown_coverage
    - E5_formula_20pct_unknown_coverage
    - formula_misinformation_stress

outputs:
  run_root: outputs/runs
  save_bid_events: true
  save_decisions: true
  save_allocations: true
  save_budgets: true
  save_utilities: true
  save_metrics: true
  save_llm_traces: true
